# ============================================================================
# IMPLEMENTATION GUIDANCE
# ============================================================================
implementation:
  # The key fix: use deterministic mapping instead of adjacency heuristics
  # Old approach: remap if adjacent to water (caused false positives)
  # New approach: remap based on template ID alone (deterministic)

  # For templates 157, 166:
  # - These are CA water wreckage templates
  # - They should ALWAYS become water in RA
  # - The issue before was remapping land cells that used these IDs
  # - Fix: verify the cells are actually in water areas before remapping
  # - Or: trust that CA only uses these templates for water

  # For template 221:
  # - This is CA rocky water crossing
  # - Should ALWAYS become 591 (RA rocky water crossing)
  # - No adjacency check needed - the template itself defines the crossing

  # High ID templates (400+, 500+, etc):
  # - Most should map to clear (255) if no equivalent
  # - Some may have specific equivalents (investigate case-by-case)

  validation_steps:
    - "1. Convert test maps with new matrix"
    - "2. Check Abendland bottom-right water area for correct rendering"
    - "3. Verify rocky crossings appear on Abendland (221->591)"
    - "4. Count remapped tiles - should be ~16 on Abendland, not 69-81"
    - "5. Visual check in OpenRA editor - no grass where water should be"

# ============================================================================
# KNOWN ANCHORS (from prior session notes)
# Use these to verify the fix works
# ============================================================================
known_anchors:
  abendland_bottom_right:
    issue: "Water/wreckage tiles render as grass (template 255)"
    expected: "Should be water"
    templates_involved: [157, 166]

  abendland_rocky_crossings:
    issue: "Rocky water crossings need to be template 591"
    expected: "~14 cells of template 221 should become 591"
    verification: "Small 1-cell minor crossing north should already be 591"

  abendland_target_remap_count:
    old: "69-81 cells (over-eager)"
    new: "~16 cells (correct)"
