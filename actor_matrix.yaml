# Actor Translation Matrix for CA -> Cameo
# Generated from analysis of 39 tournament maps (422 unique actors, 16,466 placements)
# Format: source_actor: target_actor (or "drop" to remove)
#
# IMPORTANT - Rock/stone toggle behavior:
# The source actors below (rocks*, stones*, 1x1rocks*, 2x1stones*, 1x2stones*, 2x2rocks*)
# are mapped to Cameo rock1-rock6. This mapping is ONLY applied when the
# "Remove Problematic Actors" checkbox is UNCHECKED (or --no-remove-actors is passed
# on the CLI). When the checkbox is checked (default), these actors are DROPPED
# because the Cameo rock assets use .des (desert) palette files that render
# incorrectly on the RA_TEMPERAT tileset.
# Bushes and other decorative actors (sbush*, bush*, lbush*) are always dropped
# because they have no defensible Cameo equivalent with the same in-game footprint.

meta:
  source_mod: ca
  target_mod: cameo
  target_version: playtest-20260614
  total_maps_analyzed: 39
  total_placements: 16466
  unique_actors: 422
  generated: 2026-06-18

