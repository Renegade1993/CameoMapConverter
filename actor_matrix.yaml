# ============================================================================
# LAYER 2: PATTERN-BASED REMAPPING
# Regex patterns that collapse variants to base actors
# ============================================================================
pattern_rules:
  # Tree color variants: t01o, t01p, t01r, t01y, t01b -> t01
  - pattern: '^(t\d{2}|tc\d{2})([opyrb])$'
    replacement: '\1'
    description: 'Tree color variants (o=orange, p=pink, r=red, y=yellow, b=blue)'

  # Stones variants: stones1-14 -> rock1 when "Remove Problematic Actors" is disabled; dropped otherwise.
  - pattern: '^stones\d+$'
    replacement: 'rock1'
    description: 'All stone variants -> rock1 if toggle off, else dropped (.des palette issue on RA_TEMPERAT)'

  # Rock variants: rocks1, rocks2, rocks3 -> rock1 when "Remove Problematic Actors" is disabled; dropped otherwise.
  - pattern: '^rocks\d+$'
    replacement: 'rock1'
    description: 'Rock variants -> rock1 if toggle off, else dropped (.des palette issue on RA_TEMPERAT)'

  # Small rock variants: 1x1rocks1, 1x1rocks2, 1x1rocks3, 1x1searocks1-3 -> rock1 when toggle off; dropped otherwise.
  - pattern: '^1x1(?:sea)?rocks\d+$'
    replacement: 'rock1'
    description: '1x1 rock variants -> rock1 if toggle off, else dropped (.des palette issue on RA_TEMPERAT)'

  # 2x1 stones -> rock5 when "Remove Problematic Actors" is disabled; dropped otherwise.
  - pattern: '^2x1stones\d+$'
    replacement: 'rock5'
    description: '2x1 stones -> rock5 if toggle off, else dropped (.des palette issue on RA_TEMPERAT)'

  # 1x2 stones -> rock3 when "Remove Problematic Actors" is disabled; dropped otherwise.
  - pattern: '^1x2stones\d+$'
    replacement: 'rock3'
    description: '1x2 stones -> rock3 if toggle off, else dropped (.des palette issue on RA_TEMPERAT)'

  # 2x2 rocks -> rock6 when "Remove Problematic Actors" is disabled; dropped otherwise.
  - pattern: '^2x2rocks\d+$'
    replacement: 'rock6'
    description: '2x2 rocks -> rock6 if toggle off, else dropped (.des palette issue on RA_TEMPERAT)'

  # 2x1 rocks -> rock5
  - pattern: '^2x1rocks\d+$'
    replacement: 'rock5'
    description: '2x1 rocks map to rock5'

  # Tree clumps -> tc0X mappings (high ROI: 602 placements)
  # These are CA-specific tree clusters that need Cameo equivalents
  - pattern: '^tgc1$'
    replacement: 'tc01'
    description: 'Tree clump 1 -> cluster 1'

  - pattern: '^tgc2$'
    replacement: 'tc02'
    description: 'Tree clump 2 -> cluster 2'

  - pattern: '^tgc3$'
    replacement: 'tc03'
    description: 'Tree clump 3 -> cluster 3'

  - pattern: '^tgd$'
    replacement: 'tc04'
    description: 'Tree dense -> cluster 4'

  - pattern: '^tg1$'
    replacement: 'tc02'
    description: 'Tree group 1 -> cluster 2'

  - pattern: '^tg2$'
    replacement: 'tc03'
    description: 'Tree group 2 -> cluster 3'

  # .husk variants maintain base mapping
  - pattern: '^([a-z0-9_]+)\.husk$'
    replacement: '\1.husk'
    description: 'Keep husk with same base actor'

